<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Function Calling Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Ask a question</h1>

    <h2>Without tool access</h2>
    <textarea id="question-without" rows="3" placeholder="Ask anything..."></textarea>
    <button id="ask-without-button">Ask</button>
    <p>Answer: <span id="answer-without"></span></p>

    <h2>With tool access</h2>
    <textarea id="question-with" rows="3" placeholder="Ask anything..."></textarea>
    <button id="ask-with-button">Ask</button>
    <p>Raw response:</p>
    <pre id="answer-with"></pre>

    <script src="script.js"></script>
</body>
</html>
